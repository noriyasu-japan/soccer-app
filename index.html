<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>サッカーコーチAI ⚽</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #1a6b3a;
      --green-light: #d4edda;
      --green-mid: #2d8a52;
      --yellow: #f5c518;
      --bg: #f7f8f5;
      --card: #ffffff;
      --text: #1a1a1a;
      --text-sub: #666;
      --border: #e0e0e0;
      --radius: 14px;
      --radius-sm: 8px;
    }

    body {
      font-family: -apple-system, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      padding: 0 0 2rem;
    }

    /* SCREENS */
    .screen { display: none; }
    .screen.active { display: block; }

    /* HEADER */
    .hero {
      background: linear-gradient(135deg, #1a6b3a 0%, #2d8a52 100%);
      padding: 1.5rem 1.25rem 1.25rem;
      color: white;
      position: relative;
      overflow: hidden;
    }
    .hero::after {
      content: '⚽';
      position: absolute;
      right: -10px;
      bottom: -20px;
      font-size: 100px;
      opacity: 0.08;
      transform: rotate(-20deg);
    }
    .hero-label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.7;
      margin-bottom: 4px;
    }
    .hero h1 { font-size: 22px; font-weight: 700; }
    .hero p { font-size: 13px; opacity: 0.85; margin-top: 4px; }

    /* CONTENT */
    .content { padding: 1.25rem; }

    /* FORM */
    .field { margin-bottom: 1.1rem; }
    .field label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-sub);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: block;
      margin-bottom: 7px;
    }
    input[type=text], select {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--card);
      color: var(--text);
      font-size: 16px;
      font-family: inherit;
      appearance: none;
      -webkit-appearance: none;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type=text]:focus, select:focus { border-color: var(--green); }
    .select-wrap { position: relative; }
    .select-wrap::after {
      content: '▾';
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-sub);
      pointer-events: none;
    }

    /* CHIPS */
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      padding: 7px 15px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--card);
      color: var(--text-sub);
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }
    .chip.on { background: var(--Light blue); color: white; border-color: var(--Light blue); }

    /* BUTTONS */
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-green { background: var(--green); color: white; }
    .btn-gray {
      background: var(--card);
      color: var(--text-sub);
      border: 1.5px solid var(--border);
      margin-top: 10px;
    }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* CARD */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      margin-bottom: 0.75rem;
      border: 1px solid var(--border);
    }
    .card-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .card-body {
      font-size: 14px;
      color: var(--text-sub);
      line-height: 1.7;
    }

    /* SECTION LABEL */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-sub);
      margin: 1.5rem 0 0.6rem;
    }

    /* XP / LEVEL */
    .level-bar-wrap {
      background: #e8f5ee;
      border-radius: var(--radius);
      padding: 0.9rem 1.1rem;
      margin-bottom: 1rem;
    }
    .level-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .level-badge {
      background: var(--green);
      color: white;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .xp-text { font-size: 12px; color: var(--green-mid); }
    .bar-track {
      background: white;
      border-radius: 20px;
      height: 10px;
      overflow: hidden;
    }
    .bar-fill {
      background: linear-gradient(90deg, var(--green), var(--green-mid));
      height: 100%;
      border-radius: 20px;
      transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* MENU ITEM */
    .menu-item {
      background: var(--card);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      margin-bottom: 0.75rem;
      border: 1px solid var(--border);
      display: flex;
      gap: 1rem;
      align-items: flex-start;
    }
    .menu-num {
      width: 30px;
      height: 30px;
      background: var(--green-light);
      color: var(--green);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .menu-body { flex: 1; }
    .menu-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .menu-min {
      font-size: 12px;
      font-weight: 500;
      color: var(--green);
      background: var(--green-light);
      padding: 2px 9px;
      border-radius: 12px;
    }
    .menu-detail { font-size: 13px; color: var(--text-sub); line-height: 1.65; }

    /* STARS */
    .stars { display: flex; gap: 8px; margin: 0.75rem 0; }
    .star {
      font-size: 28px;
      opacity: 0.2;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .star.on { opacity: 1; }
    .star:active { transform: scale(1.3); }

    /* LOADING */
    .loading {
      text-align: center;
      padding: 4rem 1rem;
    }
    .ball-anim {
      font-size: 48px;
      animation: bounce 0.7s infinite alternate;
      display: inline-block;
    }
    @keyframes bounce {
      from { transform: translateY(0); }
      to { transform: translateY(-16px); }
    }
    .loading p {
      font-size: 15px;
      color: var(--text-sub);
      margin-top: 1.25rem;
    }

    /* DONE */
    .done-center {
      text-align: center;
      padding: 2.5rem 1.25rem;
    }
    .xp-big {
      font-size: 48px;
      font-weight: 800;
      color: var(--green);
      margin: 0.5rem 0 0.25rem;
    }

    /* ERROR */
    .error-box {
      background: #fff0f0;
      border: 1px solid #f09595;
      border-radius: var(--radius-sm);
      padding: 0.9rem;
      font-size: 13px;
      color: #a32d2d;
      margin-top: 1rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>
<div class="app">

  <!-- 画面1: セットアップ（親向け） -->
  <div class="screen active" id="s-setup">
    <div class="hero">
      <div class="hero-label">⚽ Soccer Coach AI</div>
      <h1>サッカーコーチAI</h1>
      <p>子どもの情報を入れると練習プランを作ってくれます</p>
    </div>
    <div class="content">
      <div class="field">
        <label>子どもの名前</label>
        <input type="text" id="name" placeholder="例：たくみ">
      </div>
      <div class="field">
        <label>年齢</label>
        <div class="select-wrap">
          <select id="age">
            <option value="">選んでください</option>
            <option>6歳</option><option>7歳</option><option>8歳</option>
            <option>9歳</option><option>10歳</option><option>11歳</option><option>12歳</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>サッカー歴</label>
        <div class="select-wrap">
          <select id="experience">
            <option value="">選んでください</option>
            <option value="beginner">はじめたばかり（〜6ヶ月）</option>
            <option value="mid">1〜2年</option>
            <option value="experienced">3年以上</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>得意なこと（複数OK）</label>
        <div class="chips" id="strengths">
          <div class="chip" data-v="ドリブル">ドリブル</div>
          <div class="chip" data-v="パス">パス</div>
          <div class="chip" data-v="シュート">シュート</div>
          <div class="chip" data-v="トラップ">トラップ</div>
          <div class="chip" data-v="守備">守備</div>
          <div class="chip" data-v="動き出し">動き出し</div>
          <div class="chip" data-v="まだわからない">まだわからない</div>
        </div>
      </div>
      <div class="field" style="margin-top:1rem">
        <label>あこがれ・やりたいプレー（任意）</label>
        <input type="text" id="dream" placeholder="例：久保建英みたいにドリブルしたい">
      </div>
      <div class="field">
        <label>1回の練習時間</label>
        <div class="select-wrap">
          <select id="duration">
            <option value="">選んでください</option>
            <option value="20">20分</option>
            <option value="30">30分</option>
            <option value="45">45分</option>
            <option value="60">60分以上</option>
          </select>
        </div>
      </div>
      <button class="btn btn-green" onclick="generate()">練習プランを作る →</button>
      <div id="err"></div>
    </div>
  </div>

  <!-- 画面2: ローディング -->
  <div class="screen" id="s-loading">
    <div class="loading">
      <div class="ball-anim">⚽</div>
      <p>コーチAIが<br>プランを考えています…</p>
    </div>
  </div>

  <!-- 画面3: 子ども画面 -->
  <div class="screen" id="s-play">
    <div class="hero">
      <div class="hero-label">🏆 今日のトレーニング</div>
      <h1 id="play-title">トレーニングスタート！</h1>
      <p id="play-sub">がんばろう！</p>
    </div>
    <div class="content">
      <!-- XP -->
      <div class="level-bar-wrap">
        <div class="level-row">
          <span class="level-badge">Lv.<span id="lv">1</span></span>
          <span class="xp-text"><span id="xp-now">0</span> / 100 XP</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" id="xp-bar" style="width:0%"></div>
        </div>
      </div>

      <div class="section-label">今日のメニュー</div>
      <div id="menu-list"></div>

      <div class="section-label">コーチのひとこと</div>
      <div class="card">
        <div class="card-body" id="advice" style="font-size:15px;color:var(--text)"></div>
      </div>

      <div class="section-label">トレーニングはおわった？</div>
      <div class="card">
        <div class="card-body">今日はどうだった？ ⭐でおしえて</div>
        <div class="stars" id="stars">
          <span class="star" data-i="1">⭐</span>
          <span class="star" data-i="2">⭐</span>
          <span class="star" data-i="3">⭐</span>
          <span class="star" data-i="4">⭐</span>
          <span class="star" data-i="5">⭐</span>
        </div>
        <button class="btn btn-green" id="btn-done" style="display:none" onclick="complete()">
          かんりょう！ 🎉
        </button>
      </div>

      <button class="btn btn-gray" onclick="reset()">← 最初からやり直す</button>
    </div>
  </div>

  <!-- 画面4: 完了 -->
  <div class="screen" id="s-done">
    <div class="content done-center">
      <div style="font-size:64px">🎉</div>
      <h2 style="font-size:22px;font-weight:800;margin-top:1rem">トレーニングかんりょう！</h2>
      <p style="color:var(--text-sub);margin-top:6px">すごいぞ！けいぞくは力なり！</p>
      <div class="xp-big" id="xp-earned">+30 XP</div>
      <p style="font-size:14px;color:var(--green);margin-bottom:2rem" id="lv-msg"></p>
      <button class="btn btn-green" onclick="reset()">もう一度やる →</button>
    </div>
  </div>

</div>

<script>
  let G = { xp: 0, lv: 1, rating: 0, plan: null, name: '' };

  try {
    const s = sessionStorage.getItem('soccerApp');
    if (s) G = { ...G, ...JSON.parse(s) };
  } catch(e) {}

  function save() {
    try { sessionStorage.setItem('soccerApp', JSON.stringify(G)); } catch(e) {}
  }

  function show(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0, 0);
  }

  document.querySelectorAll('.chip').forEach(c => {
    c.addEventListener('click', () => c.classList.toggle('on'));
  });

  document.querySelectorAll('.star').forEach(s => {
    s.addEventListener('click', () => {
      const i = parseInt(s.dataset.i);
      G.rating = i;
      document.querySelectorAll('.star').forEach((el, idx) => el.classList.toggle('on', idx < i));
      document.getElementById('btn-done').style.display = 'block';
    });
  });

  async function generate() {
    const name = document.getElementById('name').value.trim();
    const age = document.getElementById('age').value;
    const experience = document.getElementById('experience').value;
    const duration = document.getElementById('duration').value;
    const dream = document.getElementById('dream').value.trim();
    const strengths = [...document.querySelectorAll('#strengths .chip.on')].map(c => c.dataset.v);

    if (!name || !age || !experience || !duration) {
      document.getElementById('err').innerHTML = '<div class="error-box">名前・年齢・サッカー歴・練習時間を入力してください</div>';
      return;
    }
    document.getElementById('err').innerHTML = '';
    G.name = name;
    show('s-loading');

    try {
      const res = await fetch('/api/plan', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, age, experience, strengths, dream, duration })
      });
      const rawText = await res.text();
      if (!res.ok) {
        throw new Error('APIエラー: ' + rawText);
      }
      try {
        G.plan = JSON.parse(rawText);
      } catch(e) {
        throw new Error('パース失敗。レスポンス: ' + rawText);
      }
      save();
      renderPlay();
      show('s-play');
    } catch(e) {
      document.getElementById('err').innerHTML = `<div class="error-box">エラー: ${e.message}</div>`;
      show('s-setup');
    }
  }

  function renderPlay() {
    document.getElementById('play-title').textContent = `${G.name}のれんしゅう！`;
    document.getElementById('play-sub').textContent = 'よし、がんばろう！';
    document.getElementById('advice').textContent = G.plan?.advice || '';
    document.getElementById('lv').textContent = G.lv;
    const cur = G.xp % 100;
    document.getElementById('xp-now').textContent = cur;
    document.getElementById('xp-bar').style.width = cur + '%';

    const list = document.getElementById('menu-list');
    list.innerHTML = '';
    (G.plan?.menu || []).forEach((item, i) => {
      const el = document.createElement('div');
      el.className = 'menu-item';
      el.innerHTML = `
        <div class="menu-num">${i + 1}</div>
        <div class="menu-body">
          <div class="menu-title">
            <span>${item.title}</span>
            <span class="menu-min">${item.minutes}分</span>
          </div>
          <div class="menu-detail">${item.detail}</div>
        </div>`;
      list.appendChild(el);
    });
  }

  function complete() {
    const earned = G.rating * 6;
    G.xp += earned;
    const newLv = Math.floor(G.xp / 100) + 1;
    const up = newLv > G.lv;
    G.lv = newLv;
    save();
    document.getElementById('xp-earned').textContent = `+${earned} XP`;
    document.getElementById('lv-msg').textContent = up
      ? `🎊 レベルアップ！ レベル${G.lv}になったよ！`
      : `つぎのレベルまであと ${100 - (G.xp % 100)} XP`;
    show('s-done');
  }

  function reset() {
    G.plan = null; G.rating = 0;
    document.querySelectorAll('.star').forEach(s => s.classList.remove('on'));
    document.getElementById('btn-done').style.display = 'none';
    save();
    show('s-setup');
  }

  if (G.plan) { renderPlay(); show('s-play'); }
</script>
</body>
</html>
